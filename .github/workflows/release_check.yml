name: Mobile Release Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate_release:
    name: Expo Dependency & Diagnostics Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install Dependencies
        working-directory: mobile
        run: npm ci

      - name: Run Expo Diagnostics (Doctor)
        working-directory: mobile
        run: npx expo-doctor

      - name: Run Expo Dependency Version Alignment Check
        working-directory: mobile
        run: npx expo install --check
