name: Render Backend Warm-Up

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  warm_up:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health
        run: |
          echo "Running at $(date -u)"
          RESPONSE=$(curl -s -f -H "Accept-Encoding: gzip" https://raybuilds-proximity-attendance.onrender.com/api/health)
          echo "Response: $RESPONSE"
